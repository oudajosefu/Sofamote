name: Release

"on":
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    # Windows signing contract:
    #   secrets.AZURE_CLIENT_ID
    #   secrets.AZURE_TENANT_ID
    #   secrets.AZURE_SUBSCRIPTION_ID
    #   vars.TRUSTED_SIGNING_ENDPOINT
    #   vars.TRUSTED_SIGNING_ACCOUNT_NAME
    #   vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME
    #
    # macOS signing/notarization contract:
    #   secrets.APPLE_DEVELOPER_ID_APP_P12_BASE64
    #   secrets.APPLE_DEVELOPER_ID_APP_P12_PASSWORD
    #   secrets.APPLE_API_PRIVATE_KEY_BASE64
    #   vars.APPLE_TEAM_ID
    #   vars.APPLE_API_KEY_ID
    #   vars.APPLE_API_ISSUER_ID
    env:
      WINDOWS_SIGNING_ENABLED: ${{ matrix.os == 'windows' && secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && vars.TRUSTED_SIGNING_ENDPOINT != '' && vars.TRUSTED_SIGNING_ACCOUNT_NAME != '' && vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME != '' }}
      MACOS_SIGNING_ENABLED: ${{ matrix.os == 'macos' && secrets.APPLE_DEVELOPER_ID_APP_P12_BASE64 != '' && secrets.APPLE_DEVELOPER_ID_APP_P12_PASSWORD != '' && secrets.APPLE_API_PRIVATE_KEY_BASE64 != '' && vars.APPLE_TEAM_ID != '' && vars.APPLE_API_KEY_ID != '' && vars.APPLE_API_ISSUER_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
          - os: macos
            runner: macos-latest
          - os: linux
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build client (Vite)
        run: npm run build -w client

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build release binary (client/dist embedded inside)
        run: cargo build --release --manifest-path server/Cargo.toml

      # ── Windows: sign the standalone executable when configured ───────────
      - name: Azure login for Artifact Signing
        if: matrix.os == 'windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows executable
        if: matrix.os == 'windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files: ${{ github.workspace }}\server\target\release\sofamote.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Sofamote
          description-url: https://github.com/oudajosefu/remote-media-control

      - name: Verify Windows executable signature
        if: matrix.os == 'windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "server\target\release\sofamote.exe"
          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature on server\\target\\release\\sofamote.exe, got $($signature.Status)."
          }

      # ── Windows: produce an MSI installer ──────────────────────────────────
      - name: Install cargo-wix
        if: matrix.os == 'windows'
        run: cargo install cargo-wix

      - name: Build Windows MSI
        if: matrix.os == 'windows'
        working-directory: server
        run: cargo wix --nocapture

      - name: Sign Windows MSI
        if: matrix.os == 'windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\server\target\wix
          files-folder-filter: "*.msi"
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Sofamote Windows Installer
          description-url: https://github.com/oudajosefu/remote-media-control

      - name: Verify Windows MSI signature
        if: matrix.os == 'windows' && env.WINDOWS_SIGNING_ENABLED == 'true'
        shell: pwsh
        run: |
          $msi = Get-ChildItem "server\target\wix\*.msi" | Select-Object -First 1
          if ($null -eq $msi) {
            throw "Expected a built MSI in server\\target\\wix."
          }

          $signature = Get-AuthenticodeSignature $msi.FullName
          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature on $($msi.FullName), got $($signature.Status)."
          }

      - name: Upload Windows artifacts
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: |
            server/target/release/sofamote.exe
            server/target/wix/*.msi

      # ── macOS: produce a DMG ───────────────────────────────────────────────
      - name: Install macOS packaging tools
        if: matrix.os == 'macos'
        run: |
          cargo install cargo-bundle
          brew install create-dmg

      - name: Bundle macOS .app
        if: matrix.os == 'macos'
        working-directory: server
        run: cargo bundle --release

      - name: Prepare macOS signing assets
        if: matrix.os == 'macos' && env.MACOS_SIGNING_ENABLED == 'true'
        env:
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ vars.APPLE_API_KEY_ID }}.p8
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_DEVELOPER_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_P12_BASE64 }}
          MACOS_CERT_PATH: ${{ runner.temp }}/developer-id-application.p12
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["MACOS_CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_DEVELOPER_ID_APP_P12_BASE64"])
          )
          Path(os.environ["APPLE_API_KEY_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_API_PRIVATE_KEY_BASE64"])
          )
          PY

          echo "MACOS_CERT_PATH=$MACOS_CERT_PATH" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Configure macOS signing keychain
        if: matrix.os == 'macos' && env.MACOS_SIGNING_ENABLED == 'true'
        env:
          APPLE_DEVELOPER_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_P12_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/sofamote-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$MACOS_CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_APP_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n "s/.*\"\\(Developer ID Application: .* (${APPLE_TEAM_ID})\\)\"/\\1/p" | head -n 1)"
          if [ -z "$SIGNING_IDENTITY" ]; then
            echo "Unable to find a Developer ID Application identity for team ${APPLE_TEAM_ID}."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi

          echo "MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Sign macOS app bundle
        if: matrix.os == 'macos' && env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          codesign \
            --force \
            --deep \
            --options runtime \
            --timestamp \
            --keychain "$MACOS_KEYCHAIN_PATH" \
            --sign "$MACOS_SIGNING_IDENTITY" \
            "server/target/release/bundle/osx/Sofamote.app"
          codesign --verify --deep --strict --verbose=2 "server/target/release/bundle/osx/Sofamote.app"

      - name: Create macOS DMG
        if: matrix.os == 'macos'
        run: |
          create-dmg \
            --volname "Sofamote" \
            --window-size 600 400 \
            --app-drop-link 450 200 \
            "Sofamote.dmg" \
            "server/target/release/bundle/osx/Sofamote.app"

      - name: Notarize and staple macOS DMG
        if: matrix.os == 'macos' && env.MACOS_SIGNING_ENABLED == 'true'
        env:
          APPLE_API_ISSUER_ID: ${{ vars.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_ID: ${{ vars.APPLE_API_KEY_ID }}
        run: |
          xcrun notarytool submit \
            "Sofamote.dmg" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "Sofamote.dmg"
          xcrun stapler validate "Sofamote.dmg"
          spctl -a -vv -t open "Sofamote.dmg"

      - name: Upload macOS DMG
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: "*.dmg"

      # ── Linux: produce a .deb package ─────────────────────────────────────
      - name: Install cargo-deb
        if: matrix.os == 'linux'
        run: cargo install cargo-deb

      - name: Build Linux .deb
        if: matrix.os == 'linux'
        run: cargo deb --manifest-path server/Cargo.toml

      - name: Upload Linux .deb
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: server/target/debian/*.deb

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
