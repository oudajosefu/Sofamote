name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
          - os: macos
            runner: macos-latest
          - os: linux
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build client (Vite)
        run: npm run build -w client

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build release binary (client/dist embedded inside)
        run: cargo build --release --manifest-path server/Cargo.toml

      # ── Windows: produce an MSI installer ──────────────────────────────────
      - name: Install cargo-wix
        if: matrix.os == 'windows'
        run: cargo install cargo-wix

      - name: Build Windows MSI
        if: matrix.os == 'windows'
        working-directory: server
        run: cargo wix --nocapture

      - name: Upload Windows MSI
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: server/target/wix/*.msi

      # ── macOS: produce a DMG ───────────────────────────────────────────────
      - name: Install macOS packaging tools
        if: matrix.os == 'macos'
        run: |
          cargo install cargo-bundle
          brew install create-dmg

      - name: Bundle macOS .app
        if: matrix.os == 'macos'
        working-directory: server
        run: cargo bundle --release

      - name: Create macOS DMG
        if: matrix.os == 'macos'
        run: |
          create-dmg \
            --volname "Remote Media Control" \
            --window-size 600 400 \
            --app-drop-link 450 200 \
            "Remote-Media-Control.dmg" \
            "server/target/release/bundle/osx/Remote Media Control.app"

      - name: Upload macOS DMG
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: "*.dmg"

      # ── Linux: produce a .deb package ─────────────────────────────────────
      - name: Install cargo-deb
        if: matrix.os == 'linux'
        run: cargo install cargo-deb

      - name: Build Linux .deb
        if: matrix.os == 'linux'
        run: cargo deb --manifest-path server/Cargo.toml

      - name: Upload Linux .deb
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: server/target/debian/*.deb

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
